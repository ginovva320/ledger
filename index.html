<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger - Mortgage Calculator</title>
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- React + Babel (pinned) -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<!-- Recharts (shadcn charts) + its UMD externals -->
<script src="https://cdn.jsdelivr.net/npm/prop-types@15.8.1/prop-types.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.min.js" crossorigin="anonymous"></script>
<!-- Tailwind Play CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { sans: ['Hanken Grotesk', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
        colors: {
          border: 'hsl(var(--border) / <alpha-value>)',
          input: 'hsl(var(--input) / <alpha-value>)',
          ring: 'hsl(var(--ring) / <alpha-value>)',
          background: 'hsl(var(--background) / <alpha-value>)',
          foreground: 'hsl(var(--foreground) / <alpha-value>)',
          primary: { DEFAULT: 'hsl(var(--primary) / <alpha-value>)', foreground: 'hsl(var(--primary-foreground) / <alpha-value>)' },
          secondary: { DEFAULT: 'hsl(var(--secondary) / <alpha-value>)', foreground: 'hsl(var(--secondary-foreground) / <alpha-value>)' },
          muted: { DEFAULT: 'hsl(var(--muted) / <alpha-value>)', foreground: 'hsl(var(--muted-foreground) / <alpha-value>)' },
          accent: { DEFAULT: 'hsl(var(--accent) / <alpha-value>)', foreground: 'hsl(var(--accent-foreground) / <alpha-value>)' },
          card: { DEFAULT: 'hsl(var(--card) / <alpha-value>)', foreground: 'hsl(var(--card-foreground) / <alpha-value>)' },
          destructive: { DEFAULT: 'hsl(var(--destructive) / <alpha-value>)', foreground: 'hsl(var(--destructive-foreground) / <alpha-value>)' },
        },
        borderRadius: {
          xl: 'calc(var(--radius) + 4px)', lg: 'var(--radius)',
          md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)',
        },
      }
    }
  };
</script>
<style>
  :root{
    --background: 240 25% 99%;
    --foreground: 240 10% 12%;
    --card: 0 0% 100%;
    --card-foreground: 240 10% 12%;
    --popover: 0 0% 100%;
    --popover-foreground: 240 10% 12%;
    --primary: 153 54% 39%;
    --primary-foreground: 0 0% 100%;
    --secondary: 240 5% 96%;
    --secondary-foreground: 240 6% 16%;
    --muted: 240 5% 96%;
    --muted-foreground: 240 4% 45%;
    --accent: 240 5% 95%;
    --accent-foreground: 240 6% 16%;
    --destructive: 0 72% 51%;
    --destructive-foreground: 0 0% 100%;
    --border: 240 6% 90%;
    --input: 240 6% 88%;
    --ring: 153 54% 39%;
    --radius: 0.65rem;
    --chart-1: 153 54% 39%;
    --chart-2: 217 55% 53%;
    --chart-3: 198 58% 55%;
    --chart-4: 40 82% 56%;
    --chart-5: 240 6% 72%;
  }
  *{ border-color: hsl(var(--border)); }
  html,body{ margin:0; }
  body{ background: hsl(var(--background)); color: hsl(var(--foreground));
    font-family:'Hanken Grotesk', ui-sans-serif, system-ui, sans-serif;
    -webkit-font-smoothing:antialiased; }
  /* keep recharts surfaces from showing focus outlines */
  .recharts-wrapper:focus,.recharts-surface:focus{ outline:none; }
  .recharts-default-tooltip{ display:none !important; }
</style>
</head>
<body class="bg-background text-foreground">
  <div id="root"></div>

  <script src="lib/mortgage.js"></script>
  <script type="text/babel" src="ui/components.jsx"></script>
  <script type="text/babel" src="ui/charts.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
